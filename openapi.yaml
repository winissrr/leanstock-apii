openapi: 3.0.3
info:
  title: LeanStock API
  version: 1.0.0
  description: >
    Multi-tenant inventory system with authentication, RBAC, cursor pagination,
    and atomic inventory transfer between locations.

servers:
  - url: http://localhost:8000

tags:
  - name: Auth
  - name: Products
  - name: Locations
  - name: Inventory
  - name: Reports
  - name: Alerts

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new tenant user
      description: Creates a tenant and an initial user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  tenantName: Acme Corp
                  tenantSlug: acme
                  firstName: Alice
                  lastName: Smith
                  email: admin@acme.com
                  password: StrongPass123!
                  role: ADMIN
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
              examples:
                default:
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    tokenType: bearer
                    user:
                      id: 2d2f3f2d-8c1a-4a3e-9f47-4b62f0d5b4f1
                      email: admin@acme.com
                      role: ADMIN
                      tenantSlug: acme
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      description: Verifies credentials and returns access and refresh tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  tenantSlug: acme
                  email: admin@acme.com
                  password: StrongPass123!
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
              examples:
                default:
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    tokenType: bearer
                    user:
                      id: 2d2f3f2d-8c1a-4a3e-9f47-4b62f0d5b4f1
                      email: admin@acme.com
                      role: ADMIN
                      tenantSlug: acme
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              default:
                value:
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
              examples:
                default:
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    tokenType: bearer
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      description: Revokes the provided refresh token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              default:
                value:
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                default:
                  value:
                    message: Logged out successfully
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns the authenticated user from the access token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              examples:
                default:
                  value:
                    id: 2d2f3f2d-8c1a-4a3e-9f47-4b62f0d5b4f1
                    email: admin@acme.com
                    firstName: Alice
                    lastName: Smith
                    role: ADMIN
                    tenantSlug: acme
                    tenantName: Acme Corp
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /products:
    get:
      tags: [Products]
      summary: List products with cursor pagination
      description: Returns tenant-scoped products in cursor order.
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          example: c_01HZXK3Q2M8Q8W2
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          example: 10
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursorProductListResponse'
              examples:
                default:
                  value:
                    data:
                      - id: prod_1
                        sku: LAP-001
                        name: Laptop
                        category: Electronics
                        quantity: 50
                        locationId: loc_1
                        tenantId: ten_1
                    nextCursor: c_01HZXK3Q2M8Q8W2
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

    post:
      tags: [Products]
      summary: Create product
      description: Creates a new tenant-scoped product.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
            examples:
              default:
                value:
                  sku: LAP-001
                  name: Laptop
                  category: Electronics
                  locationId: loc_1
                  quantity: 50
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /locations:
    get:
      tags: [Locations]
      summary: List locations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Locations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationResponse'
              examples:
                default:
                  value:
                    - id: loc_1
                      name: Warehouse A
                      code: WH-A
                      tenantId: ten_1
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

    post:
      tags: [Locations]
      summary: Create location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateRequest'
            examples:
              default:
                value:
                  name: Warehouse A
                  code: WH-A
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /inventory:
    get:
      tags: [Inventory]
      summary: List inventory items
      description: All results are scoped by tenantId from the JWT.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItemResponse'
              examples:
                default:
                  value:
                    - id: inv_1
                      productId: prod_1
                      locationId: loc_1
                      quantity: 50
                      tenantId: ten_1
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /inventory/receive:
    post:
      tags: [Inventory]
      summary: Receive stock into inventory
      description: Adds stock to a tenant-scoped inventory item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveStockRequest'
            examples:
              default:
                value:
                  productId: prod_1
                  locationId: loc_1
                  quantity: 20
      responses:
        '200':
          description: Stock received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItemResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /inventory/transfer:
    post:
      tags: [Inventory]
      summary: Transfer stock between locations atomically
      description: >
        Performs atomic inventory transfer within the tenant scope.
        The backend should enforce transactional integrity to prevent overselling.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferStockRequest'
            examples:
              default:
                value:
                  productId: prod_1
                  fromLocationId: loc_1
                  toLocationId: loc_2
                  quantity: 10
      responses:
        '200':
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
              examples:
                default:
                  value:
                    message: Transfer successful
                    fromLocationId: loc_1
                    toLocationId: loc_2
                    quantity: 10
                    productId: prod_1
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /inventory/adjust:
    post:
      tags: [Inventory]
      summary: Adjust inventory quantity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockRequest'
            examples:
              default:
                value:
                  inventoryItemId: inv_1
                  quantityDelta: -3
                  reason: Damaged goods
      responses:
        '200':
          description: Inventory adjusted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItemResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /reports/valuation:
    get:
      tags: [Reports]
      summary: Inventory valuation report
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Valuation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValuationReportResponse'
              examples:
                default:
                  value:
                    tenantId: ten_1
                    totalItems: 250
                    totalValue: 125000
                    currency: KZT
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /alerts:
    get:
      tags: [Alerts]
      summary: List stock alerts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertResponse'
              examples:
                default:
                  value:
                    - id: al_1
                      productId: prod_1
                      type: LOW_STOCK
                      message: Stock below reorder threshold
                      tenantId: ten_1
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
        - tenantName
        - tenantSlug
        - firstName
        - lastName
        - email
        - password
        - role
      properties:
        tenantName:
          type: string
          minLength: 2
          example: Acme Corp
        tenantSlug:
          type: string
          minLength: 2
          pattern: '^[a-z0-9-]+$'
          example: acme
        firstName:
          type: string
          minLength: 1
          example: Alice
        lastName:
          type: string
          minLength: 1
          example: Smith
        email:
          type: string
          format: email
          example: admin@acme.com
        password:
          type: string
          minLength: 8
          example: StrongPass123!
        role:
          type: string
          enum: [USER, ADMIN]
          example: ADMIN

    LoginRequest:
      type: object
      required:
        - tenantSlug
        - email
        - password
      properties:
        tenantSlug:
          type: string
          example: acme
        email:
          type: string
          format: email
          example: admin@acme.com
        password:
          type: string
          example: StrongPass123!

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AccessTokenResponse:
      type: object
      required:
        - accessToken
        - tokenType
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: bearer

    UserBriefResponse:
      type: object
      required:
        - id
        - email
        - role
        - tenantSlug
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [USER, ADMIN]
        tenantSlug:
          type: string

    UserResponse:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - tenantSlug
        - tenantName
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        tenantSlug:
          type: string
        tenantName:
          type: string

    AuthTokensResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: bearer
        user:
          $ref: '#/components/schemas/UserBriefResponse'

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Success

    ProductCreateRequest:
      type: object
      required:
        - sku
        - name
        - category
        - locationId
        - quantity
      properties:
        sku:
          type: string
          example: LAP-001
        name:
          type: string
          example: Laptop
        category:
          type: string
          example: Electronics
        locationId:
          type: string
          example: loc_1
        quantity:
          type: integer
          minimum: 0
          example: 50

    ProductResponse:
      type: object
      required:
        - id
        - sku
        - name
        - category
        - quantity
        - locationId
        - tenantId
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        category:
          type: string
        quantity:
          type: integer
        locationId:
          type: string
        tenantId:
          type: string

    CursorProductListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        nextCursor:
          type: string
          nullable: true

    LocationCreateRequest:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
          example: Warehouse A
        code:
          type: string
          example: WH-A

    LocationResponse:
      type: object
      required:
        - id
        - name
        - code
        - tenantId
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        tenantId:
          type: string

    ReceiveStockRequest:
      type: object
      required:
        - productId
        - locationId
        - quantity
      properties:
        productId:
          type: string
          example: prod_1
        locationId:
          type: string
          example: loc_1
        quantity:
          type: integer
          minimum: 1
          example: 20

    TransferStockRequest:
      type: object
      required:
        - productId
        - fromLocationId
        - toLocationId
        - quantity
      properties:
        productId:
          type: string
          example: prod_1
        fromLocationId:
          type: string
          example: loc_1
        toLocationId:
          type: string
          example: loc_2
        quantity:
          type: integer
          minimum: 1
          example: 10

    TransferResponse:
      type: object
      required:
        - message
        - productId
        - fromLocationId
        - toLocationId
        - quantity
      properties:
        message:
          type: string
          example: Transfer successful
        productId:
          type: string
        fromLocationId:
          type: string
        toLocationId:
          type: string
        quantity:
          type: integer

    AdjustStockRequest:
      type: object
      required:
        - inventoryItemId
        - quantityDelta
        - reason
      properties:
        inventoryItemId:
          type: string
          example: inv_1
        quantityDelta:
          type: integer
          example: -3
        reason:
          type: string
          example: Damaged goods

    InventoryItemResponse:
      type: object
      required:
        - id
        - productId
        - locationId
        - quantity
        - tenantId
      properties:
        id:
          type: string
        productId:
          type: string
        locationId:
          type: string
        quantity:
          type: integer
        tenantId:
          type: string

    ValuationReportResponse:
      type: object
      required:
        - tenantId
        - totalItems
        - totalValue
        - currency
      properties:
        tenantId:
          type: string
        totalItems:
          type: integer
        totalValue:
          type: number
        currency:
          type: string
          example: KZT

    AlertResponse:
      type: object
      required:
        - id
        - productId
        - type
        - message
        - tenantId
      properties:
        id:
          type: string
        productId:
          type: string
        type:
          type: string
          enum: [LOW_STOCK, OUT_OF_STOCK, DEAD_STOCK]
        message:
          type: string
        tenantId:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Something went wrong

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Bad request

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Unauthorized

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Forbidden

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Not found

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Conflict

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Validation error

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Too many requests

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error: Internal server error