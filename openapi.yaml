openapi: 3.0.3
info:
  title: LeanStock API
  version: 1.0.0
  description: |
    Production-grade inventory management backend.
    Multi-tenant, role-based, with dead-stock decay, low-stock alerts, and audit logging.

servers:
  - url: http://localhost:8000/api
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        type: { type: string, example: "https://leanstock.io/errors/not-found" }
        title: { type: string, example: "Not Found" }
        status: { type: integer, example: 404 }
        detail: { type: string, example: "Resource not found." }

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    Pagination:
      type: object
      properties:
        nextCursor: { type: string, nullable: true, example: "clxyz1234567890" }
        hasMore: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string, example: "clxyz1234567890" }
        tenantId: { type: string }
        email: { type: string, example: "admin@acme.com" }
        firstName: { type: string, example: "John" }
        lastName: { type: string, example: "Doe" }
        role: { type: string, enum: [ADMIN, MANAGER, STAFF] }
        isVerified: { type: boolean }
        createdAt: { type: string, format: date-time }

    Tenant:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "Acme Corp" }
        slug: { type: string, example: "acme-corp" }

    Product:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        sku: { type: string, example: "WIDGET-001" }
        name: { type: string, example: "Blue Widget" }
        description: { type: string, nullable: true }
        category: { type: string, nullable: true, example: "Electronics" }
        unitPrice: { type: string, example: "49.99" }
        reorderThreshold: { type: integer, example: 10 }
        isDecayEnabled: { type: boolean }
        decayDaysThreshold: { type: integer, example: 30 }
        decayPercent: { type: string, example: "10.00" }
        createdAt: { type: string, format: date-time }

    Location:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string, example: "Main Warehouse" }
        address: { type: string, nullable: true, example: "123 Industrial Ave" }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    InventoryItem:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        productId: { type: string }
        locationId: { type: string }
        quantity: { type: integer, example: 42 }
        currentPrice: { type: string, example: "45.00" }
        originalPrice: { type: string, example: "49.99" }
        version: { type: integer, example: 3 }
        lastReceivedAt: { type: string, format: date-time }
        product:
          $ref: '#/components/schemas/Product'
        location:
          $ref: '#/components/schemas/Location'

    StockTransaction:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        productId: { type: string }
        locationId: { type: string }
        userId: { type: string }
        type:
          type: string
          enum: [INBOUND, OUTBOUND, TRANSFER_IN, TRANSFER_OUT, ADJUSTMENT]
        quantityDelta: { type: integer, example: 10 }
        note: { type: string, nullable: true }
        supplierRef: { type: string, nullable: true, example: "PO-2024-001" }
        relatedTxId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    StockAlert:
      type: object
      properties:
        id: { type: string }
        tenantId: { type: string }
        inventoryItemId: { type: string }
        status:
          type: string
          enum: [ACTIVE, RESOLVED, SNOOZED]
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
        inventoryItem:
          $ref: '#/components/schemas/InventoryItem'

    ValuationRow:
      type: object
      properties:
        productId: { type: string }
        sku: { type: string }
        name: { type: string }
        category: { type: string, nullable: true }
        totalQty: { type: integer, example: 150 }
        currentValue: { type: string, example: "6750.00" }
        originalValue: { type: string, example: "7498.50" }
        valueLostToDecay: { type: string, example: "748.50" }
        locationCount: { type: integer, example: 3 }

  parameters:
    cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: Cursor from previous page (last item's id)
    limit:
      name: limit
      in: query
      schema: { type: integer, default: 20, maximum: 100 }
      description: Number of items per page (max 100)

security:
  - bearerAuth: []

paths:
  # ─── Auth ──────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (and tenant if slug is new)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName, tenantSlug]
              properties:
                email: { type: string, format: email, example: "admin@acme.com" }
                password: { type: string, minLength: 8, example: "Secure@123" }
                firstName: { type: string, example: "John" }
                lastName: { type: string, example: "Doe" }
                tenantSlug: { type: string, example: "acme-corp" }
                tenantName: { type: string, example: "Acme Corp" }
      responses:
        '201':
          description: Registered. Verification email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  userId: { type: string }
                  tenantId: { type: string }
        '409': { description: Email already exists }
        '422': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ValidationError' } } } }

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email address via token link
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Email verified }
        '400': { description: Invalid or expired token }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenantSlug]
              properties:
                email: { type: string, format: email, example: "admin@acme.com" }
                password: { type: string, example: "Secure@123" }
                tenantSlug: { type: string, example: "acme-corp" }
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401': { description: Invalid credentials }
        '403': { description: Email not verified }
        '423': { description: Account locked }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and get new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
        '401': { description: Invalid or expired refresh token }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke tokens and blacklist access token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200': { description: Logged out }
        '401': { description: Unauthorized }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, tenantSlug]
              properties:
                email: { type: string, format: email }
                tenantSlug: { type: string }
      responses:
        '200': { description: Reset email sent (always 200 to prevent enumeration) }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using email token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200': { description: Password reset }
        '400': { description: Invalid or expired token }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '401': { description: Unauthorized }

  # ─── Products ─────────────────────────────────────────────────────────

  /products:
    get:
      tags: [Products]
      summary: List all products (paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: category
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Product' } }
        '401': { description: Unauthorized }
    post:
      tags: [Products]
      summary: Create a product (ADMIN, MANAGER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, name, unitPrice]
              properties:
                sku: { type: string, example: "WIDGET-001" }
                name: { type: string, example: "Blue Widget" }
                description: { type: string }
                category: { type: string, example: "Electronics" }
                unitPrice: { type: number, example: 49.99 }
                reorderThreshold: { type: integer, default: 0 }
                isDecayEnabled: { type: boolean, default: false }
                decayDaysThreshold: { type: integer, default: 30 }
                decayPercent: { type: number, default: 10 }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '403': { description: Forbidden }
        '409': { description: SKU already exists }
        '422': { description: Validation error }

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Products]
      summary: Get a product by ID
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '404': { description: Not found }
    patch:
      tags: [Products]
      summary: Update a product (ADMIN, MANAGER)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                category: { type: string }
                unitPrice: { type: number }
                reorderThreshold: { type: integer }
                isDecayEnabled: { type: boolean }
                decayDaysThreshold: { type: integer }
                decayPercent: { type: number }
      responses:
        '200': { description: Updated }
        '403': { description: Forbidden }
        '404': { description: Not found }
    delete:
      tags: [Products]
      summary: Soft-delete a product (ADMIN only)
      responses:
        '204': { description: Deleted }
        '403': { description: Forbidden }
        '404': { description: Not found }

  # ─── Inventory ────────────────────────────────────────────────────────

  /inventory:
    get:
      tags: [Inventory]
      summary: List inventory items (paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: locationId
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/InventoryItem' } }

  /inventory/receive:
    post:
      tags: [Inventory]
      summary: Receive stock (INBOUND) — ADMIN, MANAGER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, locationId, quantity]
              properties:
                productId: { type: string }
                locationId: { type: string }
                quantity: { type: integer, minimum: 1, example: 100 }
                supplierRef: { type: string, example: "PO-2024-001" }
                note: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  inventoryItemId: { type: string }
                  newQuantity: { type: integer }
                  transactionId: { type: string }
        '400': { description: Invalid quantity }
        '403': { description: Forbidden }
        '404': { description: Product or location not found }
        '422': { description: Validation error }

  /inventory/transfer:
    post:
      tags: [Inventory]
      summary: Transfer stock between locations — all roles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, fromLocationId, toLocationId, quantity]
              properties:
                productId: { type: string }
                fromLocationId: { type: string }
                toLocationId: { type: string }
                quantity: { type: integer, minimum: 1 }
                note: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  outTransactionId: { type: string }
                  inTransactionId: { type: string }
                  sourceQuantity: { type: integer }
                  destQuantity: { type: integer }
        '400': { description: Same location or invalid quantity }
        '422': { description: Insufficient stock }

  /inventory/adjust:
    post:
      tags: [Inventory]
      summary: Adjust inventory quantity (shrinkage, damage) — ADMIN, MANAGER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, locationId, quantityDelta]
              properties:
                productId: { type: string }
                locationId: { type: string }
                quantityDelta: { type: integer, example: -3, description: "Negative to reduce, positive to add" }
                note: { type: string, example: "Damaged goods written off" }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  inventoryItemId: { type: string }
                  newQuantity: { type: integer }
                  transactionId: { type: string }
        '422': { description: Would result in negative stock }

  # ─── Locations ────────────────────────────────────────────────────────

  /locations:
    get:
      tags: [Locations]
      summary: List locations (paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/Location' } }
    post:
      tags: [Locations]
      summary: Create a location (ADMIN, MANAGER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Main Warehouse" }
                address: { type: string, example: "123 Industrial Ave" }
      responses:
        '201': { description: Created }
        '409': { description: Name already exists }

  /locations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Locations]
      summary: Get a location
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    patch:
      tags: [Locations]
      summary: Update a location (ADMIN, MANAGER)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Locations]
      summary: Soft-delete a location (ADMIN only — must have no active inventory)
      responses:
        '204': { description: Deleted }
        '409': { description: Location has active inventory }

  # ─── Transactions ─────────────────────────────────────────────────────

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions with filters (paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: productId
          in: query
          schema: { type: string }
        - name: locationId
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string, enum: [INBOUND, OUTBOUND, TRANSFER_IN, TRANSFER_OUT, ADJUSTMENT] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/StockTransaction' } }

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Not found }

  # ─── Alerts ───────────────────────────────────────────────────────────

  /alerts:
    get:
      tags: [Alerts]
      summary: List stock alerts (paginated)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, RESOLVED, SNOOZED] }
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: '#/components/schemas/StockAlert' } }

  /alerts/{id}:
    patch:
      tags: [Alerts]
      summary: Update alert status (ADMIN, MANAGER)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [RESOLVED, SNOOZED] }
      responses:
        '200': { description: Updated }
        '404': { description: Alert not found }

  # ─── Reports ──────────────────────────────────────────────────────────

  /reports/valuation:
    get:
      tags: [Reports]
      summary: Inventory valuation report — current vs original value (ADMIN, MANAGER)
      parameters:
        - $ref: '#/components/parameters/limit'
        - name: cursor
          in: query
          description: Numeric offset for this heavy aggregation query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/ValuationRow' } }
                  nextOffset: { type: integer, nullable: true }
        '403': { description: Forbidden }

  /reports/decay/{inventoryItemId}:
    get:
      tags: [Reports]
      summary: Decay history for an inventory item (ADMIN, MANAGER)
      parameters:
        - name: inventoryItemId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200': { description: Decay log entries }

  /reports/decay/trigger:
    post:
      tags: [Reports]
      summary: Manually trigger the dead-stock decay job (ADMIN only)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  processed: { type: integer }
                  skipped: { type: integer }
                  errors: { type: integer }
        '403': { description: Forbidden }

  /reports/audit:
    get:
      tags: [Reports]
      summary: Audit log for the tenant (ADMIN only)
      parameters:
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: string }
      responses:
        '200': { description: Audit entries }
        '403': { description: Forbidden }
