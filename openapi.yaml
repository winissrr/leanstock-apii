openapi: "3.0.3"
info:
  title: LeanStock API
  version: "1.0.0"
  description: Production-grade multi-tenant inventory management backend.
servers:
  - url: http://localhost:8000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }

    Pagination:
      type: object
      properties:
        data: { type: array, items: {} }
        nextCursor: { type: string, nullable: true }
        hasMore: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string, example: "clx1a2b3c" }
        email: { type: string, example: "admin@company.com" }
        role: { type: string, enum: [ADMIN, MANAGER, STAFF] }
        firstName: { type: string }
        lastName: { type: string }

    Product:
      type: object
      properties:
        id: { type: string }
        sku: { type: string, example: "PROD-001" }
        name: { type: string, example: "Widget Alpha" }
        category: { type: string, example: "Electronics" }
        unitPrice: { type: number, example: 29.99 }
        reorderThreshold: { type: integer, example: 10 }
        isDecayEnabled: { type: boolean }
        decayDaysThreshold: { type: integer, example: 30 }
        decayPercent: { type: number, example: 10 }

    InventoryItem:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        locationId: { type: string }
        quantity: { type: integer, example: 150 }
        currentPrice: { type: number, example: 29.99 }
        originalPrice: { type: number, example: 29.99 }
        product: { $ref: "#/components/schemas/Product" }

    Location:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "Warehouse A" }
        address: { type: string, example: "123 Main St" }

    StockTransaction:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [INBOUND, OUTBOUND, TRANSFER_IN, TRANSFER_OUT, ADJUSTMENT] }
        quantityDelta: { type: integer, example: 50 }
        note: { type: string }
        createdAt: { type: string, format: date-time }

    StockAlert:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [ACTIVE, RESOLVED, SNOOZED] }
        createdAt: { type: string, format: date-time }
        inventoryItem: { $ref: "#/components/schemas/InventoryItem" }

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      tags: [System]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /auth/register:
    post:
      summary: Register new tenant and admin user
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName, tenantName]
              properties:
                email: { type: string, example: "admin@mycompany.com" }
                password: { type: string, example: "SecurePass1" }
                firstName: { type: string, example: "Alice" }
                lastName: { type: string, example: "Smith" }
                tenantName: { type: string, example: "My Company" }
      responses:
        "201":
          description: Registered. Verification email sent.
        "409": { description: Email already registered }
        "422": { description: Validation error }

  /auth/verify-email:
    get:
      summary: Verify email address from link
      security: []
      tags: [Auth]
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "200": { description: Email verified }
        "400": { description: Invalid or expired token }

  /auth/login:
    post:
      summary: Login and receive JWT tokens
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: "admin@mycompany.com" }
                password: { type: string, example: "SecurePass1" }
      responses:
        "200":
          description: Tokens returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "401": { description: Invalid credentials }
        "403": { description: Email not verified or account suspended }
        "423": { description: Account locked }

  /auth/refresh:
    post:
      summary: Rotate refresh token
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200": { description: New tokens }
        "401": { description: Invalid or expired refresh token }

  /auth/logout:
    post:
      summary: Logout — revoke tokens
      tags: [Auth]
      responses:
        "200": { description: Logged out }
        "401": { description: Unauthorized }

  /auth/forgot-password:
    post:
      summary: Request password reset email
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
      responses:
        "200": { description: Reset link sent if email exists }

  /auth/reset-password:
    post:
      summary: Set new password using reset token
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, example: "NewPass1234" }
      responses:
        "200": { description: Password changed }
        "400": { description: Invalid or expired token }

  /auth/invite:
    post:
      summary: Invite a staff member by email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                role: { type: string, enum: [STAFF, MANAGER] }
      responses:
        "201": { description: Invitation sent }
        "403": { description: Only ADMIN or MANAGER can invite }

  /auth/accept-invite:
    post:
      summary: Accept invitation — set name and password
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                password: { type: string }
      responses:
        "200": { description: Account activated }
        "400": { description: Invalid or expired token }

  /products:
    get:
      summary: List products (cursor-paginated)
      tags: [Products]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pagination" }
        "401": { description: Unauthorized }

    post:
      summary: Create a product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, name, unitPrice]
              properties:
                sku: { type: string, example: "PROD-001" }
                name: { type: string, example: "Widget Alpha" }
                category: { type: string }
                unitPrice: { type: number, example: 29.99 }
                reorderThreshold: { type: integer, example: 10 }
                isDecayEnabled: { type: boolean }
                decayDaysThreshold: { type: integer }
                decayPercent: { type: number }
      responses:
        "201": { description: Product created }
        "403": { description: STAFF cannot create products }
        "409": { description: SKU already exists in tenant }

  /products/{id}:
    get:
      summary: Get product by ID
      tags: [Products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Product }
        "404": { description: Not found }
    patch:
      summary: Update product
      tags: [Products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Product" }
      responses:
        "200": { description: Updated }
        "403": { description: Forbidden }
        "404": { description: Not found }
    delete:
      summary: Soft-delete product
      tags: [Products]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
        "403": { description: Forbidden }

  /inventory:
    get:
      summary: List inventory items
      tags: [Inventory]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: productId
          schema: { type: string }
        - in: query
          name: locationId
          schema: { type: string }
      responses:
        "200": { description: Inventory list }
        "401": { description: Unauthorized }

  /inventory/receive:
    post:
      summary: Receive inbound stock
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, locationId, quantity]
              properties:
                productId: { type: string }
                locationId: { type: string }
                quantity: { type: integer, example: 100 }
                note: { type: string }
                supplierRef: { type: string, example: "PO-2024-001" }
      responses:
        "201": { description: Stock received }
        "404": { description: Product or location not found }
        "422": { description: Validation error }

  /inventory/transfer:
    post:
      summary: Transfer stock between locations
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, fromLocationId, toLocationId, quantity]
              properties:
                productId: { type: string }
                fromLocationId: { type: string }
                toLocationId: { type: string }
                quantity: { type: integer, example: 25 }
                note: { type: string }
      responses:
        "201": { description: Transfer complete }
        "409": { description: Insufficient stock }

  /inventory/adjust:
    post:
      summary: Adjust stock (shrinkage, damage, cycle count)
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, locationId, quantityDelta, note]
              properties:
                productId: { type: string }
                locationId: { type: string }
                quantityDelta: { type: integer, example: -5 }
                note: { type: string, example: "Damaged goods written off" }
      responses:
        "201": { description: Adjusted }
        "409": { description: Would result in negative stock }

  /locations:
    get:
      summary: List warehouse locations
      tags: [Locations]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200": { description: Location list }
    post:
      summary: Create location
      tags: [Locations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Warehouse A" }
                address: { type: string }
      responses:
        "201": { description: Location created }
        "403": { description: Forbidden }

  /locations/{id}:
    get:
      summary: Get location
      tags: [Locations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Location }
        "404": { description: Not found }
    patch:
      summary: Update location
      tags: [Locations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        "200": { description: Updated }
    delete:
      summary: Soft-delete location
      tags: [Locations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /transactions:
    get:
      summary: List stock transactions
      tags: [Transactions]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: type
          schema: { type: string, enum: [INBOUND, OUTBOUND, TRANSFER_IN, TRANSFER_OUT, ADJUSTMENT] }
        - in: query
          name: productId
          schema: { type: string }
        - in: query
          name: locationId
          schema: { type: string }
        - in: query
          name: startDate
          schema: { type: string, format: date }
        - in: query
          name: endDate
          schema: { type: string, format: date }
      responses:
        "200": { description: Transaction list }
        "401": { description: Unauthorized }

  /alerts:
    get:
      summary: List stock alerts
      tags: [Alerts]
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, RESOLVED, SNOOZED] }
      responses:
        "200": { description: Alert list }

  /alerts/{id}:
    patch:
      summary: Update alert status
      tags: [Alerts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [ACTIVE, RESOLVED, SNOOZED] }
      responses:
        "200": { description: Updated }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /reports/valuation:
    get:
      summary: Inventory valuation report
      tags: [Reports]
      parameters:
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: Valuation data per product
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        sku: { type: string }
                        name: { type: string }
                        totalQty: { type: integer }
                        currentValue: { type: number }
                        originalValue: { type: number }
                        valueLostToDecay: { type: number }
                        locationCount: { type: integer }
                  total: { type: integer }
                  generatedAt: { type: string, format: date-time }
        "403": { description: STAFF cannot access reports }
