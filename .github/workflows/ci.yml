name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: leanstock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d leanstock_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leanstock_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-test-jwt-secret-test-jwt-secret-123
      JWT_REFRESH_SECRET: test-refresh-secret-test-refresh-secret-test-refresh-123
      CORS_ORIGIN: http://localhost:3000
      BCRYPT_SALT_ROUNDS: 10
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      RATE_LIMIT_LOGIN_MAX: 5
      RATE_LIMIT_REGISTER_MAX: 5
      RATE_LIMIT_WINDOW_SECONDS: 60
      DECAY_CRON: 0 2 * * *

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test
      - run: docker build -t leanstock-api .
